name: Build Offline Neovim

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout Your Config
      uses: actions/checkout@v4
      with:
        path: repo-root

    - name: Setup Neovim
      uses: rhysd/action-setup-vim@v1
      with:
        neovim: true
        version: stable

    - name: Prepare Directories (Linux)
      if: runner.os == 'Linux'
      run: |
        mkdir -p ~/.config
        mv repo-root/LazyVim ~/.config/nvim

    - name: Prepare Directories (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        Move-Item -Path repo-root\LazyVim -Destination $env:LOCALAPPDATA\nvim

    - name: Headless Download (Plugins & Binaries)
      shell: bash
      run: |
        nvim --headless "+Lazy! sync" +qa
        nvim --headless "+MasonInstall rust-analyzer pyright gopls typescript-language-server" +qa
        sleep 45

    - name: Package Artifacts (Linux)
      if: runner.os == 'Linux'
      run: |
        mkdir offline-build
        cp -r ~/.config/nvim offline-build/nvim
        cp -r ~/.local/share/nvim offline-build/nvim-data
        tar -czvf offline-linux.tar.gz -C offline-build .

    - name: Package Artifacts (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        New-Item -ItemType Directory -Path offline-build
        Copy-Item -Path $env:LOCALAPPDATA\nvim -Destination offline-build\nvim -Recurse
        Copy-Item -Path $env:LOCALAPPDATA\nvim-data -Destination offline-build\nvim-data -Recurse
        Compress-Archive -Path offline-build\* -DestinationPath offline-windows.zip

    # Temporarily hold the files so the release job can grab them
    - name: Upload temporary files
      uses: actions/upload-artifact@v4
      with:
        name: build-${{ runner.os }}
        path: |
          offline-linux.tar.gz
          offline-windows.zip
        retention-days: 1

  # NEW JOB: Gather the files and create the public release
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # CRITICAL: Gives the bot permission to create a Release
    steps:
      - name: Download all built packages
        uses: actions/download-artifact@v4
        with:
          path: ./release-files
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Offline IDE - Build #${{ github.run_number }}"
          body: "Automated offline Neovim packages built from the latest commit."
          files: |
            ./release-files/offline-linux.tar.gz
            ./release-files/offline-windows.zip